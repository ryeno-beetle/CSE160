<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="ColoredPoints.js"></script>

    <div id="ui">
      <div>
        <button id="clear_button">clear canvas</button>
      </div>
      <div>
        <h3>drawing mode:</h3>
        <button id="squares_button">squares</button>
        <button id="triangles_button">triangles</button>
        <button id="circles_button">circles</button>
      </div>
      <div>
        <h3>shape settings:</h3>
        <div>
          <label>red: </label>
          <input type="range" min="0" max="100" value="100" class="slider" id="red_slider"/>
          <label>green: </label>
          <input type="range" min="0" max="100" value="0" class="slider" id="green_slider"/>
          <label>blue: </label>
          <input type="range" min="0" max="100" value="0" class="slider" id="blue_slider"/>
        </div>
        <div>
          <label>shape size: </label>
          <input type="range" min="0" max="100" value="10" class="slider" id="size_slider"/>
          <label>(circles) segment count: </label>
          <input type="range" min="0" max="100" value="100" class="slider" id="segment_slider"/>
        </div>
      </div>
    </div>
  </body>
</html>
