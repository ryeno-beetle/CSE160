<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>paint!</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="Shape.js"></script>
    <script src="Point.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="Line.js"></script>
    <script src="Drawing.js"></script>
    <script src="Cube.js"></script>
    <script src="Body.js"></script>
    <script src="PuppyCat.js"></script>
    <script src="BlockyAnimal.js"></script>

    <div id="ui">
      <div>
        <div>
          <label>angle:</label>
          <input type="range" min="-180" max="180" value="0" class="slider" id="angle_y_slider"/>
          <input type="range" min="-180" max="180" value="0" class="slider" id="angle_x_slider"/>
          <h3>joint control</h3>
          <label>right leg:</label>
          <input type="range" min="-30" max="30" value="0" class="slider" id="right_leg_slider"/>
          <label>left leg:</label>
          <input type="range" min="-30" max="30" value="0" class="slider" id="left_leg_slider"/>
          <p></p>
          <label>right knee:</label>
          <input type="range" min="-30" max="0" value="0" class="slider" id="right_knee_slider"/>
          <label>left knee:</label>
          <input type="range" min="-30" max="0" value="0" class="slider" id="left_knee_slider"/>
          <p></p>
          <label>right ankle:</label>
          <input type="range" min="-10" max="10" value="0" class="slider" id="right_ankle_slider"/>
          <label>left ankle:</label>
          <input type="range" min="-10" max="10" value="0" class="slider" id="left_ankle_slider"/>          
          </div>
        <div>
          <label>animation:</label>
          <button type="button" id="anim_toggle_button">ON/OFF</button>
        </div>
      </div>
    </div>
  </body>
</html>
