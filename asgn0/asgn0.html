<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="./lib/cuon-matrix-cse160.js"></script>
    <script src="asgn0.js"></script>
    <div id="ui">
      <div id="v1_ui">
        <label>v1 - </label>
        <label>x: </label>
        <input type="text" id="v1x"></input>
        <label>y: </label>
        <input type="text" id="v1y"></input>
      </div>
      <div id="v2_ui">
        <label>v2 - </label>
        <label>x: </label>
        <input type="text" id="v2x"></input>
        <label>y: </label>
        <input type="text" id="v2y"></input>
      </div>
      <div>
        <input type="button" id="draw_button" value="draw!"></input>
      </div>
      <p></p>
      <div id="operation_ui">
        <label>operation: </label>
        <select id="operation_selector">
          <option value="add">add</option>
          <option value="sub">subtract</option>
          <option value="div">divide</option>
          <option value="mul">multiply</option>
          <option value="norm">normalize</option>
          <option value="angle">angle between</option>
          <option value="area">area</option>
        </select>
        <label>scalar: </label>
        <input type="text" id="scalar_input"></input>
      </div>
      <div>
        <input type="button" id="operation_draw_button" value="draw!"></input>
      </div>
    </div>
  </body>
</html>
